  <rect x="160" y="380" width="250" height="52" rx="8" fill="#eab308" opacity="0.1" stroke="#eab308" stroke-width="1.5"/>
  <circle cx="180" cy="406" r="8" fill="#eab308" opacity="0.3"/>
