  <!-- T=3min+ -->
  <circle cx="680" cy="255" r="4" fill="#8b5cf6"/>
  <text x="698" y="253" fill="#94a3b8" font-size="9" font-weight="600">t = 3min+</text>
  <text x="698" y="268" fill="#64748b" font-size="9">Dispatch Layer 1</text>

  <!-- Parallel bars L1 -->
  <rect x="800" y="245" width="250" height="14" rx="3" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="925" y="256" text-anchor="middle" fill="#93c5fd" font-size="8">US-004 (Claude)</text>
  <rect x="800" y="263" width="200" height="14" rx="3" fill="#eab308" opacity="0.3" stroke="#eab308" stroke-width="0.5"/>
  <text x="900" y="274" text-anchor="middle" fill="#fde68a" font-size="8">US-005 (Gemini)</text>
  <rect x="800" y="281" width="230" height="14" rx="3" fill="#22c55e" opacity="0.3" stroke="#22c55e" stroke-width="0.5"/>
  <text x="915" y="292" text-anchor="middle" fill="#86efac" font-size="8">US-006 (Codex)</text>

