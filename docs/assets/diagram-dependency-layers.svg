  <text x="100" y="92" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="700">LAYER 0</text>
  <text x="100" y="106" text-anchor="middle" fill="#3b82f6" font-size="8" opacity="0.6">parallel</text>

