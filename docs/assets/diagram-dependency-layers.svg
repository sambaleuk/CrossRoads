  <line x1="148" y1="324" x2="148" y2="488" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="3 3" opacity="0.4"/>
  <text x="144" y="408" text-anchor="end" fill="#8b5cf6" font-size="16" opacity="0.3">||</text>

