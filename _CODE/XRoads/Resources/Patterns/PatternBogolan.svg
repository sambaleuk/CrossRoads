<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40" width="80" height="40">
  <!-- Horizontal bands: triangles pointing up/down alternating -->
  <polyline points="0,10 10,0 20,10 30,0 40,10 50,0 60,10 70,0 80,10" fill="none" stroke="black" stroke-width="1.5"/>
  <polyline points="0,20 10,30 20,20 30,30 40,20 50,30 60,20 70,30 80,20" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Dots at intersection nodes -->
  <circle cx="10" cy="0"  r="1.2" fill="black"/>
  <circle cx="30" cy="0"  r="1.2" fill="black"/>
  <circle cx="50" cy="0"  r="1.2" fill="black"/>
  <circle cx="70" cy="0"  r="1.2" fill="black"/>
  <circle cx="0"  cy="10" r="1.2" fill="black"/>
  <circle cx="20" cy="10" r="1.2" fill="black"/>
  <circle cx="40" cy="10" r="1.2" fill="black"/>
  <circle cx="60" cy="10" r="1.2" fill="black"/>
  <circle cx="80" cy="10" r="1.2" fill="black"/>
  <circle cx="10" cy="30" r="1.2" fill="black"/>
  <circle cx="30" cy="30" r="1.2" fill="black"/>
  <circle cx="50" cy="30" r="1.2" fill="black"/>
  <circle cx="70" cy="30" r="1.2" fill="black"/>
  <!-- Centre band: dashes -->
  <line x1="0"  y1="20" x2="4"  y2="20" stroke="black" stroke-width="1"/>
  <line x1="16" y1="20" x2="24" y2="20" stroke="black" stroke-width="1"/>
  <line x1="36" y1="20" x2="44" y2="20" stroke="black" stroke-width="1"/>
  <line x1="56" y1="20" x2="64" y2="20" stroke="black" stroke-width="1"/>
  <line x1="76" y1="20" x2="80" y2="20" stroke="black" stroke-width="1"/>
</svg>
