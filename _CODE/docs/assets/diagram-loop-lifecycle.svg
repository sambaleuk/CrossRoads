<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arr-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="#0a0e17" rx="16"/>
  <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2035" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="680" fill="url(#grid2)" rx="16"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#94a3b8" font-size="11" letter-spacing="3" font-weight="600">LOOP LIFECYCLE — HOW XROADS DEFEATS CONTEXT ROT</text>
  <line x1="340" y1="48" x2="860" y2="48" stroke="#1e293b" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="600" y="68" text-anchor="middle" fill="#475569" font-size="10">Each iteration = fresh context. The PRD is the memory. Git is the checkpoint.</text>

  <!-- ====== MAIN LOOP (center) ====== -->

  <!-- Node 1: INIT -->
  <rect x="490" y="88" width="220" height="50" rx="8" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="600" y="110" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700">INIT</text>
  <text x="600" y="126" text-anchor="middle" fill="#64748b" font-size="9">Check deps, read PRD, create files</text>

  <!-- Arrow INIT -> CHECK -->
  <line x1="600" y1="138" x2="600" y2="168" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 2: CHECK PRD -->
  <rect x="490" y="170" width="220" height="50" rx="8" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="192" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">CHECK PRD</text>
  <text x="600" y="208" text-anchor="middle" fill="#64748b" font-size="9">Count pending stories</text>

  <!-- Branch: pending == 0 -> EXIT SUCCESS -->
  <line x1="710" y1="195" x2="830" y2="195" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arr-green)"/>
  <text x="770" y="188" text-anchor="middle" fill="#22c55e" font-size="8">pending = 0</text>
  <rect x="832" y="178" width="130" height="34" rx="6" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="897" y="200" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">EXIT(0) DONE</text>

  <!-- Arrow CHECK -> BUILD PROMPT -->
  <line x1="600" y1="220" x2="600" y2="258" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="615" y="243" fill="#475569" font-size="8">pending > 0</text>

  <!-- Node 3: BUILD PROMPT (fresh context highlight) -->
  <rect x="440" y="260" width="320" height="66" rx="10" fill="#06b6d4" opacity="0.06" stroke="#06b6d4" stroke-width="2" filter="url(#glow)"/>
  <text x="600" y="284" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700">BUILD PROMPT — FRESH CONTEXT</text>
  <text x="600" y="300" text-anchor="middle" fill="#94a3b8" font-size="9">Read AGENT.md + PRD status + progress.txt</text>
  <text x="600" y="314" text-anchor="middle" fill="#06b6d4" font-size="9" font-weight="600">No stale history. No decayed tokens.</text>

  <!-- Arrow BUILD -> RUN AGENT -->
  <line x1="600" y1="326" x2="600" y2="356" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 4: RUN AGENT -->
  <rect x="490" y="358" width="220" height="50" rx="8" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="380" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">RUN AGENT</text>
  <text x="600" y="396" text-anchor="middle" fill="#64748b" font-size="9">Execute one focused task</text>

  <!-- Branch: exit != 0 -->
  <line x1="490" y1="383" x2="340" y2="383" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="415" y="376" text-anchor="middle" fill="#ef4444" font-size="8">exit != 0</text>

  <!-- Failure box -->
  <rect x="180" y="362" width="158" height="60" rx="8" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1"/>
  <text x="259" y="382" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">HANDLE FAILURE</text>
  <text x="259" y="397" text-anchor="middle" fill="#64748b" font-size="9">failures++</text>
  <text x="259" y="412" text-anchor="middle" fill="#64748b" font-size="9">3 consecutive = abort</text>

  <!-- Failure -> retry (loop back up) -->
  <line x1="259" y1="362" x2="259" y2="293" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="259" y1="293" x2="438" y2="293" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-red)"/>
  <text x="348" y="286" text-anchor="middle" fill="#ef4444" font-size="8">retry (fresh prompt)</text>

  <!-- Arrow RUN -> CHECK COMPLETE -->
  <line x1="600" y1="408" x2="600" y2="444" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="618" y="430" fill="#22c55e" font-size="8">exit = 0</text>

  <!-- Node 5: CHECK COMPLETE -->
  <rect x="490" y="446" width="220" height="50" rx="8" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="468" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">CHECK COMPLETE</text>
  <text x="600" y="484" text-anchor="middle" fill="#64748b" font-size="9">All stories done? Token detected?</text>

  <!-- Branch: all done -> EXIT -->
  <line x1="710" y1="471" x2="830" y2="471" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arr-green)"/>
  <text x="770" y="464" text-anchor="middle" fill="#22c55e" font-size="8">all done</text>
  <rect x="832" y="454" width="130" height="34" rx="6" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="897" y="476" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">EXIT(0) DONE</text>

  <!-- Arrow: not done -> AUTO COMMIT -->
  <line x1="600" y1="496" x2="600" y2="530" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="618" y="517" fill="#475569" font-size="8">not yet</text>

  <!-- Node 6: AUTO COMMIT -->
  <rect x="490" y="532" width="220" height="50" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="600" y="554" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">AUTO-COMMIT</text>
  <text x="600" y="570" text-anchor="middle" fill="#64748b" font-size="9">git add + commit partial progress</text>

  <!-- Loop back arrow: COMMIT -> BUILD PROMPT -->
  <path d="M 490 557 L 120 557 L 120 293 L 438 293" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="8 4" marker-end="url(#arr-cyan)"/>

  <!-- Loop label -->
  <rect x="60" y="408" width="120" height="44" rx="8" fill="#06b6d4" opacity="0.08" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="120" y="427" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="700">NEXT ITER</text>
  <text x="120" y="443" text-anchor="middle" fill="#06b6d4" font-size="9">Fresh context</text>

  <!-- ====== RIGHT SIDE: Key insight callout ====== -->
  <rect x="880" y="260" width="280" height="130" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1020" y="284" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="700">WHY THIS WORKS</text>
  <line x1="900" y1="294" x2="1140" y2="294" stroke="#334155" stroke-width="0.5"/>
  <text x="905" y="314" fill="#94a3b8" font-size="9.5">Context decays over long sessions.</text>
  <text x="905" y="332" fill="#94a3b8" font-size="9.5">XRoads never has long sessions.</text>
  <text x="905" y="356" fill="#22d3ee" font-size="9.5" font-weight="600">The PRD holds intent.</text>
  <text x="905" y="372" fill="#22d3ee" font-size="9.5" font-weight="600">Git holds progress.</text>
  <text x="905" y="388" fill="#22d3ee" font-size="9.5" font-weight="600">Each iteration starts clean.</text>

  <!-- Bottom annotation -->
  <rect x="300" y="620" width="600" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="600" y="638" text-anchor="middle" fill="#475569" font-size="9">Rate-limited? Loop auto-commits, cools down 60s, resumes with fresh context. Failover swaps to another model.</text>
  <text x="600" y="652" text-anchor="middle" fill="#475569" font-size="9">Context rot requires long wandering sessions to take hold. Give it a fresh room every time, and it has nowhere to grow.</text>

</svg>