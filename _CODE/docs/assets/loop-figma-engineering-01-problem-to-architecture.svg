<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">XRoads loop engineering diagram 01</title>
  <desc id="desc">Diagramme d'ingénierie Figma-ready montrant pourquoi la loop existe: failure modes, design constraints, architecture choices et shape finale du système.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#141f33"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10192b"/>
      <stop offset="100%" stop-color="#162338"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#332019"/>
      <stop offset="100%" stop-color="#281b1b"/>
    </linearGradient>
    <linearGradient id="req" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14273a"/>
      <stop offset="100%" stop-color="#112538"/>
    </linearGradient>
    <linearGradient id="sol" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#142c28"/>
      <stop offset="100%" stop-color="#11221f"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#02050a" flood-opacity="0.5"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1d2a42" stroke-width="1"/>
    </pattern>
    <marker id="arrowBlue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7dd3fc"/>
    </marker>
    <style>
      .ui { font-family: "Avenir Next", "Inter", "Segoe UI", sans-serif; }
      .mono { font-family: "SF Mono", "Menlo", "Consolas", monospace; }
      .kicker { fill: #7dd3fc; font-size: 17px; font-weight: 800; letter-spacing: 3px; }
      .headline { fill: #f8fafc; font-size: 46px; font-weight: 800; }
      .sub { fill: #9fb1c6; font-size: 22px; font-weight: 500; }
      .panelTitle { fill: #f8fafc; font-size: 26px; font-weight: 800; }
      .panelTag { fill: #cdeefe; font-size: 14px; font-weight: 800; letter-spacing: 2px; }
      .cardTitle { fill: #f8fafc; font-size: 20px; font-weight: 800; }
      .cardText { fill: #d4deea; font-size: 17px; }
      .small { fill: #90a3b9; font-size: 15px; }
      .footerLabel { fill: #d6f4ff; font-size: 13px; font-weight: 800; letter-spacing: 1.5px; }
      .footerText { fill: #edf4fb; font-size: 18px; font-weight: 700; }
      .chip { fill: #eff6ff; font-size: 15px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.35"/>

  <g class="ui">
    <text x="100" y="88" class="kicker">Figma / Engineering Diagram 01</text>
    <text x="100" y="148" class="headline">Why the loop exists: from failure modes to architecture</text>
    <text x="100" y="196" class="sub">Audience: engineers. Focus: system pressure, invariants, and architecture choices encoded in the shell loop implementation.</text>
    <rect x="100" y="220" width="412" height="34" rx="17" fill="#13223a" stroke="#284b6a" stroke-width="1.5"/>
    <text x="306" y="243" text-anchor="middle" class="chip">Importable SVG master for Figma and motion design</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="300" width="530" height="520" rx="32" fill="url(#warn)" stroke="#73463b" stroke-width="2"/>
    <text x="126" y="346" class="panelTag ui">OBSERVED FAILURE MODES</text>
    <text x="126" y="384" class="panelTitle ui">Without a loop, the agent stack drifts</text>

    <g transform="translate(126 424)">
      <rect x="0" y="0" width="458" height="86" rx="20" fill="#2a1d1a" stroke="#825042" stroke-width="2"/>
      <text x="22" y="32" class="cardTitle ui">1. Session state becomes unreliable</text>
      <text x="22" y="58" class="cardText ui">Long interactive runs mix planning, execution, retries, and memory.</text>
    </g>

    <g transform="translate(126 528)">
      <rect x="0" y="0" width="458" height="86" rx="20" fill="#2a1d1a" stroke="#825042" stroke-width="2"/>
      <text x="22" y="32" class="cardTitle ui">2. "Done" has no hard boundary</text>
      <text x="22" y="58" class="cardText ui">Changes can exist without a passing test or a synchronized status record.</text>
    </g>

    <g transform="translate(126 632)">
      <rect x="0" y="0" width="458" height="86" rx="20" fill="#2a1d1a" stroke="#825042" stroke-width="2"/>
      <text x="22" y="32" class="cardTitle ui">3. Failures are expensive to recover</text>
      <text x="22" y="58" class="cardText ui">Rate limits, broken files, or partial edits poison the next attempt.</text>
    </g>

    <g transform="translate(126 736)">
      <rect x="0" y="0" width="458" height="48" rx="16" fill="#211717" stroke="#69453c" stroke-width="1.5"/>
      <text x="22" y="31" class="small mono">Symptoms: context drift, unclear provenance, partial progress, unsafe retry</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="695" y="300" width="530" height="520" rx="32" fill="url(#req)" stroke="#335f82" stroke-width="2"/>
    <text x="731" y="346" class="panelTag ui">REQUIRED INVARIANTS</text>
    <text x="731" y="384" class="panelTitle ui">The loop enforces system-level constraints</text>

    <g transform="translate(731 424)">
      <rect x="0" y="0" width="458" height="70" rx="20" fill="#142332" stroke="#3a7093" stroke-width="2"/>
      <text x="22" y="44" class="cardText ui">One isolated workspace per agent execution path</text>
    </g>

    <g transform="translate(731 510)">
      <rect x="0" y="0" width="458" height="70" rx="20" fill="#142332" stroke="#3a7093" stroke-width="2"/>
      <text x="22" y="44" class="cardText ui">Exactly one incomplete story selected per iteration</text>
    </g>

    <g transform="translate(731 596)">
      <rect x="0" y="0" width="458" height="70" rx="20" fill="#142332" stroke="#3a7093" stroke-width="2"/>
      <text x="22" y="44" class="cardText ui">Completion requires verification: build, typecheck, unit test</text>
    </g>

    <g transform="translate(731 682)">
      <rect x="0" y="0" width="458" height="70" rx="20" fill="#142332" stroke="#3a7093" stroke-width="2"/>
      <text x="22" y="44" class="cardText ui">Shared status remains the source of truth across agents</text>
    </g>

    <g transform="translate(731 768)">
      <rect x="0" y="0" width="458" height="70" rx="20" fill="#142332" stroke="#3a7093" stroke-width="2"/>
      <text x="22" y="44" class="cardText ui">Recovery must be deterministic after rate limit or file corruption</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="1300" y="300" width="530" height="520" rx="32" fill="url(#sol)" stroke="#2f705a" stroke-width="2"/>
    <text x="1336" y="346" class="panelTag ui">ENCODED ARCHITECTURE</text>
    <text x="1336" y="384" class="panelTitle ui">How those invariants are implemented</text>

    <g transform="translate(1336 424)">
      <rect x="0" y="0" width="458" height="78" rx="20" fill="#142623" stroke="#39816b" stroke-width="2"/>
      <text x="22" y="31" class="cardTitle ui">Filtered worktree contract</text>
      <text x="22" y="56" class="cardText mono">prd.json + AGENT.md + progress.txt + logs/</text>
    </g>

    <g transform="translate(1336 518)">
      <rect x="0" y="0" width="458" height="78" rx="20" fill="#142623" stroke="#39816b" stroke-width="2"/>
      <text x="22" y="31" class="cardTitle ui">Loop scripts per provider</text>
      <text x="22" y="56" class="cardText mono">nexus-loop / gemini-loop / codex-loop</text>
    </g>

    <g transform="translate(1336 612)">
      <rect x="0" y="0" width="458" height="78" rx="20" fill="#142623" stroke="#39816b" stroke-width="2"/>
      <text x="22" y="31" class="cardTitle ui">Safety and synchronization</text>
      <text x="22" y="56" class="cardText mono">backup_loop_files() + sync_completed_stories_to_status()</text>
    </g>

    <g transform="translate(1336 706)">
      <rect x="0" y="0" width="458" height="78" rx="20" fill="#142623" stroke="#39816b" stroke-width="2"/>
      <text x="22" y="31" class="cardTitle ui">Controlled recovery</text>
      <text x="22" y="56" class="cardText mono">429 cooldown, threshold, failover exit=42, auto-commit</text>
    </g>
  </g>

  <path d="M 620 560 C 648 560, 666 560, 695 560" fill="none" stroke="#7dd3fc" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M 1225 560 C 1253 560, 1271 560, 1300 560" fill="none" stroke="#7dd3fc" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="860" width="1740" height="150" rx="30" fill="url(#panel)" stroke="#27415f" stroke-width="2"/>
    <text x="126" y="904" class="panelTag ui">RESULTING SYSTEM SHAPE</text>

    <g transform="translate(126 930)">
      <rect x="0" y="0" width="228" height="46" rx="16" fill="#13253a" stroke="#335f82" stroke-width="1.5"/>
      <text x="114" y="30" text-anchor="middle" class="footerText ui">LayeredDispatcher</text>

      <line x1="228" y1="23" x2="286" y2="23" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

      <rect x="296" y="0" width="196" height="46" rx="16" fill="#13253a" stroke="#335f82" stroke-width="1.5"/>
      <text x="394" y="30" text-anchor="middle" class="footerText ui">LoopLauncher</text>

      <line x1="492" y1="23" x2="550" y2="23" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

      <rect x="560" y="0" width="176" height="46" rx="16" fill="#13253a" stroke="#335f82" stroke-width="1.5"/>
      <text x="648" y="30" text-anchor="middle" class="footerText ui">PTY wrapper</text>

      <line x1="736" y1="23" x2="794" y2="23" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

      <rect x="804" y="0" width="218" height="46" rx="16" fill="#153028" stroke="#39816b" stroke-width="1.5"/>
      <text x="913" y="30" text-anchor="middle" class="footerText ui">isolated worktree</text>

      <line x1="1022" y1="23" x2="1080" y2="23" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

      <rect x="1090" y="0" width="194" height="46" rx="16" fill="#153028" stroke="#39816b" stroke-width="1.5"/>
      <text x="1187" y="30" text-anchor="middle" class="footerText ui">status.json</text>

      <line x1="1284" y1="23" x2="1342" y2="23" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

      <rect x="1352" y="0" width="214" height="46" rx="16" fill="#13253a" stroke="#335f82" stroke-width="1.5"/>
      <text x="1459" y="30" text-anchor="middle" class="footerText ui">monitoring layer</text>
    </g>
  </g>
</svg>
