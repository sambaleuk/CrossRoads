<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Pourquoi on a besoin d'une loop</title>
  <desc id="desc">Illustration narrative 16:9 expliquant le problème qui mène à la création d'une loop: un projet trop grand, un fil qui se perd, puis une méthode simple qui découpe, vérifie et relance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1320"/>
      <stop offset="45%" stop-color="#101d2d"/>
      <stop offset="100%" stop-color="#172435"/>
    </linearGradient>
    <linearGradient id="goldGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb84d" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#ff7a18" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="problemCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#251b19"/>
      <stop offset="100%" stop-color="#1a161a"/>
    </linearGradient>
    <linearGradient id="solutionCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102533"/>
      <stop offset="100%" stop-color="#132838"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#02050a" flood-opacity="0.55"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#20324a" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="10" markerHeight="10" orient="auto-start-auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#ffb84d"/>
    </marker>
    <style>
      .ui { font-family: "Avenir Next", "Montserrat", "Segoe UI", sans-serif; }
      .eyebrow { fill: #84ccff; font-size: 18px; letter-spacing: 4px; font-weight: 700; }
      .headline { fill: #f8fafc; font-size: 62px; font-weight: 800; }
      .subhead { fill: #b4c1d1; font-size: 26px; font-weight: 500; }
      .section { fill: #e6edf6; font-size: 28px; font-weight: 800; }
      .cardTitle { fill: #f8fafc; font-size: 28px; font-weight: 800; }
      .cardText { fill: #d0dae7; font-size: 21px; }
      .muted { fill: #8fa0b5; font-size: 19px; }
      .labelWarm { fill: #ffd7a0; font-size: 15px; font-weight: 800; letter-spacing: 2px; }
      .labelCool { fill: #9be7dc; font-size: 15px; font-weight: 800; letter-spacing: 2px; }
      .bigWord { fill: #ffffff; font-size: 36px; font-weight: 800; }
      .chip { fill: #eef6ff; font-size: 16px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.34"/>
  <ellipse cx="280" cy="140" rx="360" ry="220" fill="url(#goldGlow)"/>
  <ellipse cx="1640" cy="910" rx="460" ry="260" fill="url(#tealGlow)"/>

  <g class="ui">
    <text x="120" y="96" class="eyebrow">XROADS LOOP STORY</text>
    <text x="120" y="170" class="headline">Avant la loop, il y a un problème simple</text>
    <text x="120" y="232" class="subhead">Quand un projet devient trop grand, on perd le fil. La loop est née pour remettre du rythme, de la clarté et des preuves.</text>
    <rect x="120" y="266" width="292" height="38" rx="19" fill="#13253a" stroke="#274b6d" stroke-width="1.5"/>
    <text x="266" y="292" text-anchor="middle" class="chip">Visuel 1: l'idée qui mène à la loop</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="354" width="520" height="506" rx="34" fill="url(#problemCard)" stroke="#5f3830" stroke-width="2"/>
    <text x="160" y="410" class="section ui">1. Un grand projet paraît simple… au début</text>
    <text x="160" y="446" class="muted ui">Puis tout s'empile d'un coup.</text>

    <rect x="160" y="490" width="440" height="98" rx="24" fill="#2a1f1b" stroke="#7d4b36" stroke-width="2"/>
    <text x="190" y="526" class="labelWarm ui">MISSION GLOBALE</text>
    <text x="190" y="564" class="bigWord ui">“Construire tout ça”</text>

    <g transform="translate(168 628)">
      <rect x="0" y="0" width="122" height="78" rx="18" fill="#342623"/>
      <text x="61" y="45" text-anchor="middle" class="cardText ui">Idées</text>
      <rect x="144" y="0" width="122" height="78" rx="18" fill="#342623"/>
      <text x="205" y="45" text-anchor="middle" class="cardText ui">Bugs</text>
      <rect x="288" y="0" width="122" height="78" rx="18" fill="#342623"/>
      <text x="349" y="45" text-anchor="middle" class="cardText ui">Demandes</text>
    </g>

    <g transform="translate(168 736)">
      <rect x="0" y="0" width="412" height="86" rx="22" fill="#231a18" stroke="#6c4336" stroke-width="2"/>
      <text x="28" y="35" class="cardTitle ui">Le vrai risque</text>
      <text x="28" y="66" class="cardText ui">On mélange tout: priorité, exécution, vérification, progrès.</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="354" width="520" height="506" rx="34" fill="url(#problemCard)" stroke="#5f3830" stroke-width="2"/>
    <text x="740" y="410" class="section ui">2. Sans méthode, on perd le fil</text>
    <text x="740" y="446" class="muted ui">On avance un peu, puis on doute de tout.</text>

    <g transform="translate(760 500)">
      <path d="M 48 120 C 128 26, 226 210, 306 116 C 346 70, 388 86, 430 128" fill="none" stroke="#ffb84d" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 12"/>
      <circle cx="48" cy="120" r="14" fill="#ffb84d"/>
      <circle cx="178" cy="102" r="14" fill="#ff9e57"/>
      <circle cx="306" cy="116" r="14" fill="#fb7185"/>
      <circle cx="430" cy="128" r="14" fill="#f59e0b"/>
    </g>
    <text x="760" y="682" class="cardText ui">On ne sait plus:</text>
    <text x="790" y="722" class="cardText ui">Qu'est-ce qu'on fait maintenant ?</text>
    <text x="790" y="756" class="cardText ui">Qu'est-ce qui est vraiment fini ?</text>
    <text x="790" y="790" class="cardText ui">Qu'est-ce qui fonctionne vraiment ?</text>

    <rect x="760" y="814" width="400" height="84" rx="22" fill="#251b1a" stroke="#71463b" stroke-width="2"/>
    <text x="790" y="850" class="labelWarm ui">CONSÉQUENCE</text>
    <text x="790" y="886" class="cardText ui">Le projet paraît plus flou à mesure qu'il grandit.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1280" y="354" width="520" height="506" rx="34" fill="url(#solutionCard)" stroke="#26566d" stroke-width="2"/>
    <text x="1320" y="410" class="section ui">3. L'idée de la loop</text>
    <text x="1320" y="446" class="muted ui">Transformer un gros problème en petit cycle fiable.</text>

    <g transform="translate(1328 494)">
      <rect x="0" y="0" width="432" height="84" rx="22" fill="#123042" stroke="#2b6c83" stroke-width="2"/>
      <text x="28" y="34" class="labelCool ui">RÈGLE 1</text>
      <text x="28" y="62" class="cardText ui">Prendre une seule petite tâche à la fois</text>

      <rect x="0" y="102" width="432" height="84" rx="22" fill="#123042" stroke="#2b6c83" stroke-width="2"/>
      <text x="28" y="136" class="labelCool ui">RÈGLE 2</text>
      <text x="28" y="164" class="cardText ui">Vérifier tout de suite que ça marche</text>

      <rect x="0" y="204" width="432" height="84" rx="22" fill="#123042" stroke="#2b6c83" stroke-width="2"/>
      <text x="28" y="238" class="labelCool ui">RÈGLE 3</text>
      <text x="28" y="266" class="cardText ui">Sauvegarder l'avancement et recommencer</text>
    </g>

    <circle cx="1540" cy="794" r="68" fill="#14394a" stroke="#4ade80" stroke-width="4"/>
    <path d="M 1510 796 l22 22 l42 -48" fill="none" stroke="#86efac" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1626" y="788" class="cardTitle ui">La loop</text>
    <text x="1626" y="820" class="cardText ui">n'est pas une complication.</text>
    <text x="1626" y="850" class="cardText ui">C'est une manière de rester clair.</text>
  </g>

  <path d="M 640 608 C 664 608, 676 608, 700 608" fill="none" stroke="#ffb84d" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 1220 608 C 1244 608, 1256 608, 1280 608" fill="none" stroke="#ffb84d" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g class="ui">
    <text x="120" y="952" class="section">Traduction très grand public</text>
    <text x="120" y="996" class="cardText">Un grand objectif devient une série de petits tours. Chaque tour produit quelque chose, le prouve, puis passe au suivant.</text>
  </g>
</svg>
