<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Comment la loop fonctionne simplement</title>
  <desc id="desc">Illustration 16:9 en langage grand public: un grand objectif, une petite tâche, une réalisation, une vérification, un avancement sauvegardé, puis la tâche suivante.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09131f"/>
      <stop offset="60%" stop-color="#0f1c2b"/>
      <stop offset="100%" stop-color="#17283b"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="step1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123348"/>
      <stop offset="100%" stop-color="#173247"/>
    </linearGradient>
    <linearGradient id="step2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16384a"/>
      <stop offset="100%" stop-color="#153244"/>
    </linearGradient>
    <linearGradient id="step3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d3b39"/>
      <stop offset="100%" stop-color="#17302f"/>
    </linearGradient>
    <linearGradient id="step4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d3118"/>
      <stop offset="100%" stop-color="#2d2517"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#02050a" flood-opacity="0.55"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1f3046" stroke-width="1"/>
    </pattern>
    <marker id="arrowBlue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#6ee7d8"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#fbbf24"/>
    </marker>
    <style>
      .ui { font-family: "Avenir Next", "Montserrat", "Segoe UI", sans-serif; }
      .eyebrow { fill: #8ccfff; font-size: 18px; letter-spacing: 4px; font-weight: 700; }
      .headline { fill: #f8fafc; font-size: 60px; font-weight: 800; }
      .subhead { fill: #b5c4d6; font-size: 26px; font-weight: 500; }
      .section { fill: #eff5fb; font-size: 28px; font-weight: 800; }
      .cardTitle { fill: #f8fafc; font-size: 31px; font-weight: 800; }
      .cardText { fill: #d2dce8; font-size: 21px; }
      .label { fill: #9de6da; font-size: 15px; font-weight: 800; letter-spacing: 2px; }
      .chip { fill: #ecf4fb; font-size: 16px; font-weight: 700; }
      .loopWord { fill: #ffffff; font-size: 35px; font-weight: 800; }
      .small { fill: #8fa3ba; font-size: 18px; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.36"/>
  <ellipse cx="340" cy="150" rx="380" ry="220" fill="url(#hero)"/>

  <g class="ui">
    <text x="120" y="96" class="eyebrow">XROADS LOOP EXPLAINER V2</text>
    <text x="120" y="168" class="headline">La loop, expliquée sans jargon</text>
    <text x="120" y="230" class="subhead">Au lieu d'essayer de tout faire d'un coup, on avance par petits tours fiables. Chaque tour produit, vérifie, sauvegarde, puis relance.</text>
    <rect x="120" y="266" width="334" height="38" rx="19" fill="#13253a" stroke="#274b6d" stroke-width="1.5"/>
    <text x="287" y="292" text-anchor="middle" class="chip">Visuel 2: comment la méthode fonctionne</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="354" width="1680" height="428" rx="38" fill="#0d1725" stroke="#21344c" stroke-width="2"/>
    <text x="160" y="412" class="section ui">Le cycle principal</text>

    <g transform="translate(162 462)">
      <rect x="0" y="0" width="250" height="170" rx="28" fill="url(#step1)" stroke="#2c6985" stroke-width="2"/>
      <text x="28" y="36" class="label ui">POINT DE DÉPART</text>
      <text x="28" y="74" class="cardTitle ui">1. Un grand</text>
      <text x="28" y="110" class="cardTitle ui">objectif</text>
      <text x="28" y="144" class="cardText ui">Un projet entier à faire avancer.</text>
    </g>

    <line x1="412" y1="547" x2="500" y2="547" stroke="#6ee7d8" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

    <g transform="translate(506 462)">
      <rect x="0" y="0" width="250" height="170" rx="28" fill="url(#step2)" stroke="#2e718f" stroke-width="2"/>
      <text x="28" y="36" class="label ui">DÉCOUPAGE</text>
      <text x="28" y="74" class="cardTitle ui">2. Une petite</text>
      <text x="28" y="110" class="cardTitle ui">tâche</text>
      <text x="28" y="144" class="cardText ui">On choisit seulement la prochaine étape utile.</text>
    </g>

    <line x1="756" y1="547" x2="844" y2="547" stroke="#6ee7d8" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

    <g transform="translate(850 462)">
      <rect x="0" y="0" width="250" height="170" rx="28" fill="url(#step2)" stroke="#2e718f" stroke-width="2"/>
      <text x="28" y="36" class="label ui">ACTION</text>
      <text x="28" y="74" class="cardTitle ui">3. On la</text>
      <text x="28" y="110" class="cardTitle ui">réalise</text>
      <text x="28" y="144" class="cardText ui">Un incrément concret est produit.</text>
    </g>

    <line x1="1100" y1="547" x2="1188" y2="547" stroke="#6ee7d8" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

    <g transform="translate(1194 462)">
      <rect x="0" y="0" width="250" height="170" rx="28" fill="url(#step3)" stroke="#327761" stroke-width="2"/>
      <text x="28" y="36" class="label ui">PREUVE</text>
      <text x="28" y="74" class="cardTitle ui">4. On vérifie</text>
      <text x="28" y="110" class="cardTitle ui">que ça marche</text>
      <text x="28" y="144" class="cardText ui">Si ce n'est pas solide, on ne fait pas semblant.</text>
    </g>

    <line x1="1444" y1="547" x2="1532" y2="547" stroke="#6ee7d8" stroke-width="7" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

    <g transform="translate(1538 462)">
      <rect x="0" y="0" width="224" height="170" rx="28" fill="url(#step4)" stroke="#8a6a1a" stroke-width="2"/>
      <text x="28" y="36" class="label ui">MÉMOIRE</text>
      <text x="28" y="74" class="cardTitle ui">5. On garde</text>
      <text x="28" y="110" class="cardTitle ui">la trace</text>
      <text x="28" y="144" class="cardText ui">Le progrès est sauvegardé.</text>
    </g>

    <path d="M 1650 648 C 1650 742, 1550 792, 1280 792 L 600 792 C 360 792, 270 752, 270 690" fill="none" stroke="#fbbf24" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 12" marker-end="url(#arrowGold)"/>
    <text x="836" y="854" text-anchor="middle" class="loopWord ui">Puis on passe à la tâche suivante</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="826" width="780" height="172" rx="34" fill="#0d1725" stroke="#21344c" stroke-width="2"/>
    <text x="160" y="882" class="section ui">Ce que le public doit retenir</text>
    <text x="160" y="930" class="cardText ui">La loop n'est pas un “truc technique”.</text>
    <text x="160" y="964" class="cardText ui">C'est une méthode pour avancer sans se perdre.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="826" width="860" height="172" rx="34" fill="#0d1725" stroke="#21344c" stroke-width="2"/>
    <text x="980" y="882" class="section ui">Traduction des mots compliqués</text>
    <text x="980" y="930" class="cardText ui">“Story” = une petite tâche précise.</text>
    <text x="980" y="964" class="cardText ui">“Progress” = ce qu'on a réellement terminé et prouvé.</text>
  </g>

  <g class="ui">
    <text x="120" y="1038" class="small">Cette version remplace les mots internes par des mots compréhensibles à l'écran et en voix off.</text>
  </g>
</svg>
