<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad-slot1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-slot2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-slot3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-merge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#0a0e17" rx="16"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2035" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="720" fill="url(#grid)" rx="16"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#94a3b8" font-size="11" letter-spacing="3" font-weight="600">XROADS ORCHESTRATION PIPELINE</text>
  <line x1="400" y1="52" x2="800" y2="52" stroke="#1e293b" stroke-width="1"/>

  <!-- ====== ROW 1: PRD ====== -->
  <rect x="475" y="68" width="250" height="56" rx="10" fill="none" stroke="#06b6d4" stroke-width="1.5" filter="url(#glow-cyan)"/>
  <rect x="475" y="68" width="250" height="56" rx="10" fill="#06b6d4" opacity="0.08"/>
  <text x="600" y="90" text-anchor="middle" fill="#06b6d4" font-size="13" font-weight="700">PRD.JSON</text>
  <text x="600" y="108" text-anchor="middle" fill="#64748b" font-size="10">Stories + Dependencies + Tests</text>

  <!-- Arrow PRD -> Dispatcher -->
  <line x1="600" y1="124" x2="600" y2="154" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker></defs>

  <!-- ====== ROW 2: LayeredDispatcher ====== -->
  <rect x="410" y="156" width="380" height="56" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="410" y="156" width="380" height="56" rx="10" fill="#8b5cf6" opacity="0.08"/>
  <text x="600" y="178" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">LAYERED DISPATCHER</text>
  <text x="600" y="196" text-anchor="middle" fill="#64748b" font-size="10">Dependency Layers + Slot Assignment</text>

  <!-- Three arrows down from dispatcher -->
  <line x1="300" y1="212" x2="300" y2="262" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="212" x2="600" y2="262" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="900" y1="212" x2="900" y2="262" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Horizontal connector -->
  <line x1="300" y1="212" x2="900" y2="212" stroke="#334155" stroke-width="1.5"/>

  <!-- ====== ROW 3: Three Slots ====== -->

  <!-- Slot 1: Claude -->
  <rect x="150" y="264" width="300" height="130" rx="10" fill="url(#grad-slot1)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="300" y="288" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">SLOT 1 — CLAUDE</text>
  <line x1="175" y1="298" x2="425" y2="298" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <text x="175" y="318" fill="#94a3b8" font-size="10">Loop</text>
  <text x="260" y="318" fill="#cbd5e1" font-size="10">nexus-loop (fresh session/iter)</text>
  <text x="175" y="338" fill="#94a3b8" font-size="10">Branch</text>
  <text x="260" y="338" fill="#cbd5e1" font-size="10">slot-1-claude-us-001</text>
  <text x="175" y="358" fill="#94a3b8" font-size="10">Worktree</text>
  <text x="260" y="358" fill="#cbd5e1" font-size="10">/worktrees/slot-1/ (isolated)</text>
  <text x="175" y="378" fill="#94a3b8" font-size="10">Action</text>
  <text x="260" y="378" fill="#3b82f6" font-size="10" font-weight="600">implement</text>

  <!-- Slot 2: Gemini -->
  <rect x="450" y="264" width="300" height="130" rx="10" fill="url(#grad-slot2)" stroke="#eab308" stroke-width="1.5"/>
  <text x="600" y="288" text-anchor="middle" fill="#eab308" font-size="12" font-weight="700">SLOT 2 — GEMINI</text>
  <line x1="475" y1="298" x2="725" y2="298" stroke="#eab308" stroke-width="0.5" opacity="0.3"/>
  <text x="475" y="318" fill="#94a3b8" font-size="10">Loop</text>
  <text x="560" y="318" fill="#cbd5e1" font-size="10">gemini-loop (fresh session/iter)</text>
  <text x="475" y="338" fill="#94a3b8" font-size="10">Branch</text>
  <text x="560" y="338" fill="#cbd5e1" font-size="10">slot-2-gemini-us-002</text>
  <text x="475" y="358" fill="#94a3b8" font-size="10">Worktree</text>
  <text x="560" y="358" fill="#cbd5e1" font-size="10">/worktrees/slot-2/ (isolated)</text>
  <text x="475" y="378" fill="#94a3b8" font-size="10">Action</text>
  <text x="560" y="378" fill="#eab308" font-size="10" font-weight="600">implement</text>

  <!-- Slot 3: Codex -->
  <rect x="750" y="264" width="300" height="130" rx="10" fill="url(#grad-slot3)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="900" y="288" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">SLOT 3 — CODEX</text>
  <line x1="775" y1="298" x2="1025" y2="298" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
  <text x="775" y="318" fill="#94a3b8" font-size="10">Loop</text>
  <text x="860" y="318" fill="#cbd5e1" font-size="10">codex-loop (fresh session/iter)</text>
  <text x="775" y="338" fill="#94a3b8" font-size="10">Branch</text>
  <text x="860" y="338" fill="#cbd5e1" font-size="10">slot-3-codex-us-003</text>
  <text x="775" y="358" fill="#94a3b8" font-size="10">Worktree</text>
  <text x="860" y="358" fill="#cbd5e1" font-size="10">/worktrees/slot-3/ (isolated)</text>
  <text x="775" y="378" fill="#94a3b8" font-size="10">Action</text>
  <text x="860" y="378" fill="#22c55e" font-size="10" font-weight="600">test</text>

  <!-- ====== ROW 4: Convergence arrows ====== -->
  <line x1="300" y1="394" x2="300" y2="440" stroke="#334155" stroke-width="1.5"/>
  <line x1="600" y1="394" x2="600" y2="440" stroke="#334155" stroke-width="1.5"/>
  <line x1="900" y1="394" x2="900" y2="440" stroke="#334155" stroke-width="1.5"/>
  <line x1="300" y1="440" x2="900" y2="440" stroke="#334155" stroke-width="1.5"/>
  <line x1="600" y1="440" x2="600" y2="462" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== ROW 5: status.json + StatusMonitor ====== -->
  <rect x="430" y="464" width="160" height="48" rx="8" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="430" y="464" width="160" height="48" rx="8" fill="#f59e0b" opacity="0.08"/>
  <text x="510" y="486" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">STATUS.JSON</text>
  <text x="510" y="502" text-anchor="middle" fill="#64748b" font-size="9">Source of truth</text>

  <line x1="590" y1="488" x2="640" y2="488" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="642" y="464" width="170" height="48" rx="8" fill="none" stroke="#06b6d4" stroke-width="1"/>
  <rect x="642" y="464" width="170" height="48" rx="8" fill="#06b6d4" opacity="0.06"/>
  <text x="727" y="486" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="700">STATUS MONITOR</text>
  <text x="727" y="502" text-anchor="middle" fill="#64748b" font-size="9">Poll 5s + detect completions</text>

  <!-- Arrow down to GitMaster -->
  <line x1="600" y1="512" x2="600" y2="550" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== ROW 6: GitMaster Merge ====== -->
  <rect x="380" y="552" width="440" height="60" rx="10" fill="url(#grad-merge)" stroke="#c084fc" stroke-width="1.5"/>
  <text x="600" y="576" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="700">GITMASTER — INTELLIGENT MERGE</text>
  <text x="600" y="596" text-anchor="middle" fill="#64748b" font-size="10">Analyze conflicts + Auto-resolve + Merge all branches into target</text>

  <!-- Arrow to result -->
  <line x1="600" y1="612" x2="600" y2="646" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result -->
  <rect x="480" y="648" width="240" height="44" rx="8" fill="none" stroke="#22c55e" stroke-width="1.5" filter="url(#glow-blue)"/>
  <rect x="480" y="648" width="240" height="44" rx="8" fill="#22c55e" opacity="0.08"/>
  <text x="600" y="667" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">FEATURE COMPLETE</text>
  <text x="600" y="683" text-anchor="middle" fill="#64748b" font-size="9">Merged to target branch</text>

  <!-- Side annotations -->
  <!-- Left: "Isolation" -->
  <text x="68" y="340" text-anchor="middle" fill="#334155" font-size="28" font-weight="800" transform="rotate(-90 68 340)" letter-spacing="6">ISOLATION</text>
  <!-- Right: "Parallelism" -->
  <text x="1132" y="340" text-anchor="middle" fill="#334155" font-size="28" font-weight="800" transform="rotate(90 1132 340)" letter-spacing="6">PARALLELISM</text>

</svg>